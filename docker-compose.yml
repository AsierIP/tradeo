services:
  db:
    image: postgres:16-alpine
    container_name: tradeo-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradeo
      POSTGRES_PASSWORD: tradeo
      POSTGRES_DB: tradeo
    volumes:
      - tradeo_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradeo -d tradeo"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: tradeo-redis
    restart: unless-stopped
    volumes:
      - tradeo_redis:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tradeo-backend
    restart: unless-stopped
    env_file: .env
    environment:
      TRADEO_MARKET_DATA_CACHE_DIR: ${TRADEO_MARKET_DATA_CACHE_DIR:-/app/artifacts/runtime/ohlcv_cache}
      TRADEO_UNIVERSE_SNAPSHOT_DIR: ${TRADEO_UNIVERSE_SNAPSHOT_DIR:-/app/artifacts/runtime/universe_snapshots}
    ports:
      - "${TRADEO_BACKEND_BIND:-127.0.0.1}:8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data:ro
      - ./config:/app/config:ro
      - ./artifacts:/app/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tradeo-worker
    restart: unless-stopped
    command: ["python", "-m", "tradeo.tasks.worker"]
    env_file: .env
    environment:
      TRADEO_MARKET_DATA_CACHE_DIR: ${TRADEO_MARKET_DATA_CACHE_DIR:-/app/artifacts/runtime/ohlcv_cache}
      TRADEO_UNIVERSE_SNAPSHOT_DIR: ${TRADEO_UNIVERSE_SNAPSHOT_DIR:-/app/artifacts/runtime/universe_snapshots}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./reports:/app/reports
      - ./data:/app/data:ro
      - ./config:/app/config:ro
      - ./artifacts:/app/artifacts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; os.kill(1, 0)'"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: tradeo-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      TRADEO_API_INTERNAL_URL: http://backend:8000/api
    ports:
      - "${TRADEO_FRONTEND_BIND:-127.0.0.1}:3000:3000"
    depends_on:
      - backend

volumes:
  tradeo_postgres:
  tradeo_redis:
