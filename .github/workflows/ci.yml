name: ci

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "frontend/**"
      - "ops/**"
      - "docker-compose*.yml"
      - ".env.example"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "frontend/**"
      - "ops/**"
      - "docker-compose*.yml"
      - ".env.example"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ops-readiness:
    name: ops readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Docker Compose config
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.audit.yml config --quiet
      - name: Validate latest tracked Director package
        run: python ops/scripts/director_audit_ci.py

  backend:
    name: backend lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend with dev extras
        run: pip install -e ".[dev]"
      - name: Ruff stable backend surface
        run: |
          set -euo pipefail
          files=(
            tradeo/core/config.py
            tradeo/services/data_provider.py
            tradeo/services/intraday_research_readiness.py
            tradeo/services/intraday_universe_builder.py
            tradeo/tasks/worker.py
            tradeo/tests/test_intraday_research_readiness.py
            tradeo/tests/test_intraday_universe_builder.py
            tradeo/tests/test_selected_universe_rows.py
          )
          optional_files=(
            tradeo/tests/test_data_provider.py
            tradeo/tests/test_intraday_worker_jobs.py
            tradeo/tests/test_us_listed_stock_candidates.py
          )
          for file in "${optional_files[@]}"; do
            if [[ -f "$file" ]]; then
              files+=("$file")
            fi
          done
          python -m ruff check "${files[@]}"
      - name: Pytest stable backend suite
        run: |
          set -euo pipefail
          tests=(
            tradeo/tests/test_intraday_research_readiness.py
            tradeo/tests/test_intraday_universe_builder.py
            tradeo/tests/test_selected_universe_rows.py
          )
          optional_tests=(
            tradeo/tests/test_data_provider.py
            tradeo/tests/test_intraday_worker_jobs.py
            tradeo/tests/test_us_listed_stock_candidates.py
          )
          for test_file in "${optional_tests[@]}"; do
            if [[ -f "$test_file" ]]; then
              tests+=("$test_file")
            fi
          done
          python -m pytest -q "${tests[@]}"

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
