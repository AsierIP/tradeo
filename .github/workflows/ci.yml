name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ops-readiness:
    name: ops readiness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate Docker Compose config
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml -f docker-compose.audit.yml config --quiet
      - name: Validate latest tracked Director package
        run: python ops/scripts/director_audit_ci.py

  backend:
    name: backend lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install backend with dev extras
        run: pip install -e ".[dev]"
      - name: Ruff
        run: python -m ruff check .
      - name: Pytest
        run: python -m pytest -q

  frontend:
    name: frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
