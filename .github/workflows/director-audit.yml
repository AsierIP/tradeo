name: Director audit bridge

on:
  pull_request:
    paths:
      - "research/audit_bridge/**"
      - "ops/scripts/director_audit_ci.py"
      - "docker-compose*.yml"
      - ".github/workflows/director-audit.yml"
      - "docs/deployment.md"
      - "docs/ibkr_operational_guide.md"
  schedule:
    - cron: "35 21 * * *"
  workflow_dispatch:
    inputs:
      audit_package:
        description: "Audit package directory under research/audit_bridge/requests"
        required: false
        type: string

jobs:
  audit-bridge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Director audit package readiness
        env:
          TRADEO_AUDIT_PACKAGE: ${{ github.event.inputs.audit_package || '' }}
        run: |
          if [ -n "$TRADEO_AUDIT_PACKAGE" ]; then
            python ops/scripts/director_audit_ci.py --package "$TRADEO_AUDIT_PACKAGE"
          else
            python ops/scripts/director_audit_ci.py
          fi
